services:
  - type: web
    name: smartsphere-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: egerton_smartsphere
          property: connectionString
      - key: JWT_SECRET
        generateValue: true